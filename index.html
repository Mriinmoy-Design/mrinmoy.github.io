<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio v2</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #05050a;
      color: #f0ece4;
      min-height: 100vh;
    }

    #app {
      min-height: 100vh;
    }

    .studio-root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px 48px;
      position: relative;
      overflow-x: hidden;
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      transition: background 0.8s;
    }

    .layer {
      width: 100%;
      max-width: 860px;
      z-index: 1;
    }

    .header {
      margin-bottom: 14px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tiny-label {
      font-size: 9px;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-family: monospace;
    }

    .title {
      font-size: 24px;
      letter-spacing: 2px;
      font-weight: 400;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .recent-notes {
      display: flex;
      gap: 5px;
      align-items: center;
      min-height: 24px;
      min-width: 180px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .style-selector {
      display: flex;
      gap: 5px;
      margin-bottom: 14px;
      flex-wrap: wrap;
      justify-content: center;
      z-index: 1;
    }

    .tab-bar {
      display: flex;
      margin-bottom: 16px;
      border-radius: 9px;
      overflow: hidden;
      z-index: 1;
      border: 1px solid rgba(255, 255, 255, 0.07);
    }

    button,
    a,
    input {
      font: inherit;
    }

    button {
      border: none;
      cursor: pointer;
      background: transparent;
    }

    .chip-btn {
      padding: 6px 13px;
      border-radius: 7px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    .tab-btn {
      padding: 7px 16px;
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.5px;
      color: #444;
      transition: all 0.2s;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
    }

    .tab-content {
      width: 100%;
      max-width: 860px;
      z-index: 1;
    }

    .play-wrap,
    .tutorial-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .controls-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .segmented {
      display: flex;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 7px;
      overflow: hidden;
    }

    .segmented button {
      padding: 6px 12px;
      font-family: monospace;
      font-size: 11px;
      color: #444;
      border-right: 1px solid rgba(255, 255, 255, 0.07);
    }

    .segmented button:last-child {
      border-right: none;
    }

    .vol-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .vol-wrap span {
      color: #333;
      font-size: 10px;
      font-family: monospace;
    }

    input[type="range"] {
      height: 4px;
      outline: none;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .record-btn {
      padding: 6px 14px;
      border-radius: 7px;
      font-family: monospace;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .rec-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
      background: #444;
    }

    .piano-scroll {
      width: 100%;
      overflow-x: auto;
      padding-bottom: 8px;
      display: flex;
      justify-content: center;
    }

    .piano {
      position: relative;
      height: 210px;
      border-radius: 6px 6px 14px 14px;
      border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 40px color-mix(in srgb, var(--accent) 8%, transparent);
      overflow: visible;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .piano-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 14px;
      border-radius: 6px 6px 0 0;
      z-index: 10;
    }

    .white-key,
    .black-key,
    .drum-pad {
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .white-key,
    .black-key {
      position: absolute;
      transition: all 0.06s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      cursor: pointer;
    }

    .white-key {
      top: 14px;
      width: 49px;
      height: 196px;
      border-top: none;
      border-radius: 0 0 7px 7px;
      z-index: 1;
      gap: 2px;
      padding-bottom: 9px;
    }

    .black-key {
      top: 14px;
      width: 34px;
      height: 126px;
      border-top: none;
      border-radius: 0 0 5px 5px;
      z-index: 3;
      padding-bottom: 6px;
    }

    .key-guide {
      text-align: center;
      margin-top: 4px;
    }

    .key-guide-label {
      font-size: 9px;
      color: #2a2a3a;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 3px;
      font-family: monospace;
    }

    .key-guide-text {
      font-size: 10px;
      color: #333;
      font-family: monospace;
    }

    .key-guide-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .song-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .panel {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 12px;
      padding: 18px 20px;
      width: 100%;
    }

    .panel-title {
      font-size: 10px;
      color: #444;
      font-family: monospace;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .steps-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .step-chip {
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
      min-width: 44px;
      transition: all 0.15s;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .small-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: 16px;
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
    }

    .settings-wrap {
      width: 100%;
      max-width: 600px;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section-label {
      font-size: 9px;
      color: #444;
      font-family: monospace;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding-left: 2px;
    }

    .settings-panel {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row-label {
      font-size: 11px;
      color: #555;
      font-family: monospace;
      min-width: 110px;
      letter-spacing: 0.5px;
    }

    .toggle {
      width: 44px;
      height: 24px;
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle-knob {
      position: absolute;
      top: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .drum-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 620px;
    }

    .drum-pad {
      border-radius: 14px;
      padding: 18px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: all 0.06s;
      border: 2px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.03);
    }

    .recordings-wrap {
      width: 100%;
      max-width: 860px;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .recording-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .recording-empty {
      text-align: center;
      padding: 50px 0;
      color: #333;
      font-family: monospace;
      font-size: 13px;
    }

    .save-link {
      font-size: 11px;
      text-decoration: none;
      font-family: monospace;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      color: var(--accent);
    }

    .delete-btn {
      background: rgba(255, 60, 60, 0.08);
      border: 1px solid rgba(255, 60, 60, 0.2);
      color: #ff6b6b;
      padding: 6px 12px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 11px;
    }

    .muted {
      color: #444;
      font-family: monospace;
    }

    audio {
      outline: none;
      max-width: 220px;
      height: 32px;
      flex: 2 1 160px;
    }

    @keyframes blink {
      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.2;
      }
    }

    @media (max-width: 760px) {
      .tab-bar {
        width: 100%;
        overflow-x: auto;
      }

      .tab-btn {
        white-space: nowrap;
      }

      .drum-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .recording-item {
        padding: 12px;
      }

      audio {
        max-width: 100%;
      }
    }
  </style>
</head>

          { key: "d", note: "E4", label: "-gle" },
          { key: "d", note: "E4", label: "bells" },
          { key: "d", note: "E4", label: "jin-" },
          { key: "g", note: "G4", label: "-gle" },
          { key: "a", note: "C4", label: "all" },
          { key: "s", note: "D4", label: "the" },
          { key: "d", note: "E4", label: "way" }
        ]
      }
    };

    const state = {
      style: "piano",
      activeKeys: new Set(),
      octave: 0,
      useReverb: false,
      volume: 0.7,
      bpm: 120,
      recordings: [],
      isRecording: false,
      recTime: 0,
      recentNotes: [],
      tab: "play",
      selectedSong: "Twinkle Twinkle",
      tutStep: -1,
      tutPlaying: false,
      showStickers: true,
      stickerSlots: {}
    };

    const refs = {
      app: null,
      recorder: null,
      recTimer: null,
      tutTimer: null,
      keyDownHandler: null,
      keyUpHandler: null,
      objectUrls: new Set(),
      chunks: []
    };

    const audio = (() => {
      let ctx = null;
      let master = null;
      let reverb = null;
      const active = {};

      function getCtx() {
        if (!ctx) {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtx) {
            throw new Error("Web Audio API not supported in this browser.");
          }
          ctx = new AudioCtx();
          master = ctx.createGain();
          master.gain.value = 0.7;
          master.connect(ctx.destination);
        }
        if (ctx.state === "suspended") {
          ctx.resume().catch(() => {});
        }
        return ctx;
      }

      function getReverb(localCtx) {
        if (!reverb) {
          const conv = localCtx.createConvolver();
          const len = localCtx.sampleRate * 2.5;
          const buf = localCtx.createBuffer(2, len, localCtx.sampleRate);
          for (let c = 0; c < 2; c += 1) {
            const d = buf.getChannelData(c);
            for (let i = 0; i < len; i += 1) {
              d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
            }
          }
          conv.buffer = buf;
          conv.connect(master);
          reverb = conv;
        }
        return reverb;
      }

      function playNote(keyObj, styleCfg, octave, useReverb, vol) {
        const localCtx = getCtx();
        if (active[keyObj.key]) {
          return;
        }

        master.gain.value = vol;
        const osc = localCtx.createOscillator();
        const gain = localCtx.createGain();
        const freq = keyObj.freq * Math.pow(2, octave);

        osc.type = styleCfg.waveform || "sine";
        osc.frequency.setValueAtTime(freq, localCtx.currentTime);
        if (styleCfg.detune) {
          osc.detune.value = styleCfg.detune;
        }

        gain.gain.setValueAtTime(0, localCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.6, localCtx.currentTime + (styleCfg.attack || 0.01));

        osc.connect(gain);
        if (styleCfg.filterType) {
          const filter = localCtx.createBiquadFilter();
          filter.type = styleCfg.filterType;
          filter.frequency.value = styleCfg.filterType === "lowpass" ? 2200 : styleCfg.filterType === "highpass" ? 800 : 1500;
          gain.connect(filter);
          filter.connect(useReverb ? getReverb(localCtx) : master);
        } else {
          gain.connect(useReverb ? getReverb(localCtx) : master);
        }

        osc.start();
        active[keyObj.key] = { osc, gain };
      }

      function stopNote(keyObj, styleCfg) {
        const localCtx = getCtx();
        const activeNode = active[keyObj.key];
        if (!activeNode) {
          return;
        }

        const release = styleCfg.release || 0.4;
        activeNode.gain.gain.setValueAtTime(activeNode.gain.gain.value, localCtx.currentTime);
        activeNode.gain.gain.exponentialRampToValueAtTime(0.0001, localCtx.currentTime + release);
        activeNode.osc.stop(localCtx.currentTime + release + 0.05);
        delete active[keyObj.key];
      }

      function noiseBuffer(localCtx, sec) {
        const b = localCtx.createBuffer(1, localCtx.sampleRate * sec, localCtx.sampleRate);
        const d = b.getChannelData(0);
        for (let i = 0; i < d.length; i += 1) {
          d[i] = Math.random() * 2 - 1;
        }
        const src = localCtx.createBufferSource();
        src.buffer = b;
        return src;
      }

      function playDrum(drum, vol) {
        const localCtx = getCtx();
        master.gain.value = vol;
        const t = localCtx.currentTime;
        const g = localCtx.createGain();
        g.connect(master);

        if (drum.name === "Kick") {
          const o = localCtx.createOscillator();
          o.connect(g);
          o.frequency.setValueAtTime(55, t);
          o.frequency.exponentialRampToValueAtTime(0.001, t + 0.5);
          g.gain.setValueAtTime(1, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
          o.start(t);
          o.stop(t + 0.5);
        } else if (drum.name === "Snare") {
          const s = noiseBuffer(localCtx, 0.2);
          const f = localCtx.createBiquadFilter();
          f.type = "highpass";
          f.frequency.value = 1000;
          s.connect(f);
          f.connect(g);
          g.gain.setValueAtTime(0.8, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
          s.start(t);
          s.stop(t + 0.2);
        } else if (drum.name === "Hi-Hat") {
          const s = noiseBuffer(localCtx, 0.06);
          const f = localCtx.createBiquadFilter();
          f.type = "highpass";
          f.frequency.value = 8000;
          s.connect(f);
          f.connect(g);
          g.gain.setValueAtTime(0.5, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
          s.start(t);
          s.stop(t + 0.06);
        } else if (drum.name === "Open HH") {
          const s = noiseBuffer(localCtx, 0.3);
          const f = localCtx.createBiquadFilter();
          f.type = "highpass";
          f.frequency.value = 6000;
          s.connect(f);
          f.connect(g);
          g.gain.setValueAtTime(0.5, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          s.start(t);
          s.stop(t + 0.3);
        } else if (drum.name === "Crash") {
          const s = noiseBuffer(localCtx, 1.5);
          const f = localCtx.createBiquadFilter();
          f.type = "bandpass";
          f.frequency.value = 5000;
          f.Q.value = 0.5;
          s.connect(f);
          f.connect(g);
          g.gain.setValueAtTime(0.7, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
          s.start(t);
          s.stop(t + 1.5);
        } else if (drum.name === "Tom Hi") {
          const o = localCtx.createOscillator();
          o.connect(g);
          o.frequency.setValueAtTime(220, t);
          o.frequency.exponentialRampToValueAtTime(55, t + 0.3);
          g.gain.setValueAtTime(0.8, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          o.start(t);
          o.stop(t + 0.3);
        } else if (drum.name === "Tom Lo") {
          const o = localCtx.createOscillator();
          o.connect(g);
          o.frequency.setValueAtTime(110, t);
          o.frequency.exponentialRampToValueAtTime(30, t + 0.4);
          g.gain.setValueAtTime(0.8, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
          o.start(t);
          o.stop(t + 0.4);
        } else if (drum.name === "Clap") {
          [0, 0.01, 0.02].forEach((delay) => {
            const s = noiseBuffer(localCtx, 0.1);
            const f = localCtx.createBiquadFilter();
            f.type = "bandpass";
            f.frequency.value = 1200;
            s.connect(f);
            f.connect(g);
            s.start(t + delay);
            s.stop(t + delay + 0.1);
          });
          g.gain.setValueAtTime(0.6, t);
        } else if (drum.name === "Rim") {
          const o = localCtx.createOscillator();
          o.type = "square";
          o.frequency.value = 800;
          o.connect(g);
          g.gain.setValueAtTime(0.4, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
          o.start(t);
          o.stop(t + 0.06);
        } else if (drum.name === "Cowbell") {
          const o = localCtx.createOscillator();
          o.type = "square";
          o.frequency.value = 562;
          o.connect(g);
          g.gain.setValueAtTime(0.5, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
          o.start(t);
          o.stop(t + 0.4);
        }
      }

      function getDestination() {
        const localCtx = getCtx();
        const dest = localCtx.createMediaStreamDestination();
        master.connect(dest);
        return dest;
      }

      function cleanup() {
        Object.keys(active).forEach((key) => {
          try {
            active[key].osc.stop();
          } catch (_err) {}
          delete active[key];
        });
        if (ctx && ctx.state !== "closed") {
          ctx.close().catch(() => {});
        }
      }

      return { playNote, stopNote, playDrum, getDestination, cleanup };
    })();

    function getCfg() {
      return STYLES[state.style];
    }

    function isDrumMode() {
      return state.style === "drumkit";
    }

    function setState(patch) {
      Object.assign(state, patch);
      renderApp();
    }

    function initStickerSlots() {
      const cfg = getCfg();
      const slots = {};
      const stickers = cfg.stickers || [];
      WHITE_KEYS.forEach((k, i) => {
        slots[k.key] = stickers[i % stickers.length];
      });
      state.stickerSlots = slots;
    }

    function clamp(num, min, max) {
      return Math.max(min, Math.min(max, num));
    }

    function fmtTime(total) {
      const m = String(Math.floor(total / 60)).padStart(2, "0");
      const s = String(total % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function escapeHTML(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function updateRecent(label) {
      state.recentNotes = [label, ...state.recentNotes].slice(0, 7);
    }

    function startRec() {
      if (state.isRecording) {
        return;
      }
      if (typeof MediaRecorder === "undefined") {
        alert("MediaRecorder is not available in this browser.");
        return;
      }

      try {
        const dest = audio.getDestination();
        const rec = new MediaRecorder(dest.stream);
        refs.chunks = [];

        rec.ondataavailable = (e) => {
          if (e.data && e.data.size > 0) {
            refs.chunks.push(e.data);
          }
        };

        rec.onstop = () => {
          const blob = new Blob(refs.chunks, { type: "audio/webm" });
          const url = URL.createObjectURL(blob);
          refs.objectUrls.add(url);
          const label = `Take ${state.recordings.length + 1}`;
          state.recordings = [
            ...state.recordings,
            {
              id: Date.now() + Math.random(),
              url,
              time: new Date().toLocaleTimeString(),
              dur: 0,
              label
            }
          ];
          renderApp();
        };

        rec.start();
        refs.recorder = rec;
        state.isRecording = true;
        state.recTime = 0;
        clearInterval(refs.recTimer);
        refs.recTimer = setInterval(() => {
          state.recTime += 1;
          renderApp();
        }, 1000);
        renderApp();
      } catch (err) {
        console.error(err);
        alert("Could not start recording.");
      }
    }

    function stopRec(skipRender) {
      if (!state.isRecording && (!refs.recorder || refs.recorder.state === "inactive")) {
        return;
      }

      try {
        if (refs.recorder && refs.recorder.state !== "inactive") {
          refs.recorder.stop();
        }
      } catch (_err) {}

      state.isRecording = false;
      clearInterval(refs.recTimer);
      refs.recTimer = null;

      if (!skipRender) {
        renderApp();
      }
    }

    function deleteRec(id) {
      const rec = state.recordings.find((r) => String(r.id) === String(id));
      if (rec && rec.url) {
        URL.revokeObjectURL(rec.url);
        refs.objectUrls.delete(rec.url);
      }
      state.recordings = state.recordings.filter((r) => String(r.id) !== String(id));
      renderApp();
    }

    function triggerKey(keyId, down) {
      const cfg = getCfg();

      if (isDrumMode()) {
        const drum = DRUM_MAP.find((d) => d.key === keyId);
        if (!drum) {
          return;
        }

        if (down) {
          audio.playDrum(drum, state.volume);
          const next = new Set(state.activeKeys);
          next.add(keyId);
          state.activeKeys = next;
          updateRecent(drum.name);
          renderApp();
        } else {
          setTimeout(() => {
            const next = new Set(state.activeKeys);
            next.delete(keyId);
            state.activeKeys = next;
            renderApp();
          }, 120);
        }
      } else {
        const keyObj = KEY_MAP.find((k) => k.key === keyId);
        if (!keyObj) {
          return;
        }

        if (down) {
          audio.playNote(keyObj, cfg, state.octave, state.useReverb, state.volume);
          const next = new Set(state.activeKeys);
          next.add(keyId);
          state.activeKeys = next;
          updateRecent(keyObj.note);
          renderApp();
        } else {
          audio.stopNote(keyObj, cfg);
          const next = new Set(state.activeKeys);
          next.delete(keyId);
          state.activeKeys = next;
          renderApp();
        }
      }
    }

    function playTutorial() {
      if (isDrumMode()) {
        return;
      }

      const song = SONGS[state.selectedSong];
      if (!song) {
        return;
      }

      stopTutorial(true);
      state.tutPlaying = true;
      state.tutStep = 0;

      const interval = (60000 / state.bpm) * 0.9;
      let i = 0;

      const tick = () => {
        if (!state.tutPlaying) {
          return;
        }

        if (i >= song.steps.length) {
          state.tutPlaying = false;
          state.tutStep = -1;
          state.activeKeys = new Set();
          renderApp();
          return;
        }

        state.tutStep = i;
        const step = song.steps[i];
        const keyObj = KEY_MAP.find((k) => k.key === step.key);
        const cfg = getCfg();

        if (keyObj) {
          audio.playNote(keyObj, cfg, state.octave, false, state.volume);
          setTimeout(() => {
            audio.stopNote(keyObj, cfg);
          }, interval * 0.7);
        }

        state.activeKeys = new Set([step.key]);
        renderApp();

        const flashStep = i;
        setTimeout(() => {
          if (state.tutStep === flashStep) {
            state.activeKeys = new Set();
            renderApp();
          }
        }, interval * 0.7);

        i += 1;
        refs.tutTimer = setTimeout(tick, interval);
      };

      tick();
    }

    function stopTutorial(skipRender) {
      clearTimeout(refs.tutTimer);
      refs.tutTimer = null;
      state.tutPlaying = false;
      state.tutStep = -1;
      state.activeKeys = new Set();
      if (!skipRender) {
        renderApp();
      }
    }

    function renderPianoKeys() {
      const cfg = getCfg();
      const totalW = WHITE_KEYS.length * 52;
      const song = SONGS[state.selectedSong];
      const tutKeyNow = state.tutStep >= 0 && song ? song.steps[state.tutStep]?.key : null;

      const white = WHITE_KEYS.map((k, i) => {
        const active = state.activeKeys.has(k.key);
        const isTut = tutKeyNow === k.key;
        const bg = active
          ? `linear-gradient(180deg,${cfg.accent}55,${cfg.accent}22 60%,${cfg.accent}66)`
          : isTut
            ? `linear-gradient(180deg,${cfg.accent}33,${cfg.accent}11)`
            : cfg.whiteKey || "linear-gradient(180deg,#f0ece8,#ddd8cc)";
        const border = active
          ? `1px solid ${cfg.accent}99`
          : isTut
            ? `1px solid ${cfg.accent}66`
            : "1px solid #aaa";
        const keyColor = active ? cfg.accent : isTut ? `${cfg.accent}cc` : "#aaa";

        return `
          <div class="white-key playable-key"
               data-key="${escapeHTML(k.key)}"
               style="
                 left:${i * 52}px;
                 background:${bg};
                 border:${border};
                 transform:${active ? "translateY(2px)" : "none"};
                 box-shadow:${active ? `0 4px 22px ${cfg.accent}66,inset 0 -3px 6px rgba(0,0,0,0.1)` : isTut ? `0 0 12px ${cfg.accent}44` : "0 5px 10px rgba(0,0,0,0.4)"};
               ">
            ${state.showStickers && state.stickerSlots[k.key] ? `<span style="font-size:14px;margin-bottom:3px;opacity:${active ? 1 : 0.5};transition:opacity 0.1s;">${escapeHTML(state.stickerSlots[k.key])}</span>` : ""}
            <span style="font-size:10px;font-weight:bold;color:${keyColor};font-family:monospace;transition:color 0.05s;">${escapeHTML(k.key.toUpperCase())}</span>
          </div>
        `;
      }).join("");

      const black = BLACK_KEYS.map((k) => {
        const afterIdx = WHITE_KEYS.findIndex((w) => w.note === k.after);
        const left = afterIdx * 52 + 34;
        const active = state.activeKeys.has(k.key);
        const isTut = tutKeyNow === k.key;
        const bg = active
          ? `linear-gradient(180deg,${cfg.accent}ee,${cfg.accent}99)`
          : isTut
            ? `linear-gradient(180deg,${cfg.accent}66,${cfg.accent}33)`
            : cfg.blackKey || "linear-gradient(180deg,#1a1a22,#0f0f14)";
        const border = active ? `1px solid ${cfg.accent}` : isTut ? `1px solid ${cfg.accent}88` : "1px solid #080810";

        return `
          <div class="black-key playable-key"
               data-key="${escapeHTML(k.key)}"
               style="
                 left:${left}px;
                 background:${bg};
                 border:${border};
                 transform:${active ? "translateY(2px)" : "none"};
                 box-shadow:${active ? `0 0 22px ${cfg.accent}88,0 6px 16px rgba(0,0,0,0.6)` : isTut ? `0 0 12px ${cfg.accent}44` : "0 6px 16px rgba(0,0,0,0.8)"};
               ">
            <span style="font-size:9px;color:${active ? "#fff" : isTut ? cfg.accent : "#444"};font-family:monospace;font-weight:bold;">
              ${escapeHTML(k.key.toUpperCase())}
            </span>
          </div>
        `;
      }).join("");

      return `
        <div class="piano-scroll">
          <div class="piano" style="width:${totalW}px;background:${cfg.keyboardBg || "linear-gradient(180deg,#18181f,#0f0f14)"};">
            <div class="piano-top" style="background:linear-gradient(180deg,${cfg.accent}22,transparent);"></div>
            ${white}
            ${black}
          </div>
        </div>
      `;
    }

    function renderDrumKit() {
      const cfg = getCfg();
      return `
        <div class="drum-grid">
          ${DRUM_MAP.map((drum, i) => {
            const active = state.activeKeys.has(drum.key);
            const sticker = cfg.stickers?.[i % cfg.stickers.length] || drum.icon;
            return `
              <button class="drum-pad playable-key" data-key="${escapeHTML(drum.key)}"
                style="
                  background:${active ? `${drum.color}33` : "rgba(255,255,255,0.03)"};
                  border-color:${active ? drum.color : "rgba(255,255,255,0.07)"};
                  box-shadow:${active ? `0 0 24px ${drum.color}55` : "none"};
                  transform:${active ? "scale(0.95)" : "scale(1)"};
                ">
                <span style="font-size:22px;">${escapeHTML(state.showStickers ? sticker : drum.icon)}</span>
                <span style="font-size:11px;color:${active ? drum.color : "#444"};font-family:monospace;">${escapeHTML(drum.name)}</span>
                <span style="
                  font-size:12px;
                  font-weight:bold;
                  color:${active ? drum.color : "#2a2a2a"};
                  background:${active ? `${drum.color}22` : "rgba(255,255,255,0.04)"};
                  border:1px solid ${active ? `${drum.color}55` : "rgba(255,255,255,0.05)"};
                  border-radius:5px;
                  padding:2px 8px;
                  font-family:monospace;
                ">${escapeHTML(drum.key.toUpperCase())}</span>
              </button>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderPlayTab() {
      const cfg = getCfg();
      const isDrum = isDrumMode();

      return `
        <div class="play-wrap">
          <div class="controls-row">
            ${!isDrum ? `
              <div class="segmented">
                ${[-1, 0, 1].map((o) => `
                  <button data-action="set-octave" data-value="${o}"
                    style="background:${state.octave === o ? `${cfg.accent}22` : "transparent"};color:${state.octave === o ? cfg.accent : "#444"};">
                    ${o === 0 ? "OCT" : o > 0 ? "+1" : "-1"}
                  </button>`).join("")}
              </div>
              <button class="chip-btn" data-action="toggle-reverb"
                style="background:${state.useReverb ? `${cfg.accent}22` : "transparent"};border-color:${state.useReverb ? cfg.accent : "rgba(255,255,255,0.08)"};color:${state.useReverb ? cfg.accent : "#444"};">
                REVERB
              </button>
            ` : ""}

            <button class="chip-btn" data-action="toggle-stickers"
              style="background:${state.showStickers ? `${cfg.accent}22` : "transparent"};border-color:${state.showStickers ? cfg.accent : "rgba(255,255,255,0.08)"};color:${state.showStickers ? cfg.accent : "#444"};">
              STICKERS ${state.showStickers ? "ON" : "OFF"}
            </button>

            <div class="vol-wrap">
              <span>VOL</span>
              <input data-control="volume" type="range" min="0" max="1" step="0.01" value="${state.volume}" style="width:65px" />
            </div>

            <button class="record-btn" data-action="rec-toggle"
              style="
                background:${state.isRecording ? "rgba(255,30,30,0.18)" : "rgba(255,255,255,0.04)"};
                border-color:${state.isRecording ? "#ff3030" : "rgba(255,255,255,0.08)"};
                color:${state.isRecording ? "#ff4444" : "#555"};
                box-shadow:${state.isRecording ? "0 0 14px rgba(255,0,0,0.25)" : "none"};
              ">
              <span class="rec-dot" style="
                background:${state.isRecording ? "#ff4444" : "#444"};
                box-shadow:${state.isRecording ? "0 0 6px #ff4444" : "none"};
                animation:${state.isRecording ? "blink 1s infinite" : "none"};
              "></span>
              ${state.isRecording ? `REC ${fmtTime(state.recTime)}` : "REC"}
            </button>
          </div>

          ${isDrum ? renderDrumKit() : renderPianoKeys()}

          <div class="key-guide">
            <div class="key-guide-label">Keyboard</div>
            ${isDrum
              ? `<div class="key-guide-text">A S D F G H J K L ; — Drums</div>`
              : `<div class="key-guide-row key-guide-text"><span>White: A S D F G H J K L ; '</span><span>Black: W E T Y U O P</span></div>`}
          </div>
        </div>
      `;
    }

    function renderTutorialTab() {
      const cfg = getCfg();
      const song = SONGS[state.selectedSong];
      const beatMs = Math.round(60000 / state.bpm);

      return `
        <div class="tutorial-wrap" style="gap:16px;">
          <div class="song-picker">
            ${Object.keys(SONGS).map((name) => `
              <button class="chip-btn" data-action="select-song" data-value="${escapeHTML(name)}"
                style="
                  background:${state.selectedSong === name ? `${cfg.accent}25` : "rgba(255,255,255,0.03)"};
                  border-color:${state.selectedSong === name ? cfg.accent : "rgba(255,255,255,0.07)"};
                  color:${state.selectedSong === name ? cfg.accent : "#555"};
                  padding:7px 14px;
                  border-radius:8px;
                ">${escapeHTML(name)}</button>
            `).join("")}
          </div>

          <div class="panel">
            <div class="panel-title">Notes — ${escapeHTML(state.selectedSong)}</div>
            <div class="steps-wrap">
              ${song.steps.map((step, i) => {
                const active = state.tutStep === i;
                const done = state.tutStep > i;
                return `
                  <div class="step-chip"
                    style="
                      background:${active ? `${cfg.accent}44` : done ? "rgba(255,255,255,0.08)" : "rgba(255,255,255,0.04)"};
                      border-color:${active ? cfg.accent : done ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.05)"};
                      box-shadow:${active ? `0 0 14px ${cfg.accent}55` : "none"};
                      transform:${active ? "scale(1.12)" : "scale(1)"};
                    ">
                    <div style="font-size:14px;font-weight:bold;color:${active ? cfg.accent : done ? `${cfg.accent}88` : "#555"};font-family:monospace;">${escapeHTML(step.key.toUpperCase())}</div>
                    <div style="font-size:9px;color:${active ? "#ccc" : "#444"};margin-top:2px;font-family:monospace;">${escapeHTML(step.note)}</div>
                    <div style="font-size:9px;color:${active ? `${cfg.accent}cc` : "#333"};font-family:monospace;">${escapeHTML(step.label)}</div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>

          <div class="controls-row" style="gap:10px;">
            <span style="color:#555;font-size:11px;font-family:monospace;">BPM</span>
            <button class="small-btn" data-action="bpm-step" data-value="-5">−</button>
            <span style="color:${cfg.accent};font-size:22px;font-family:monospace;min-width:60px;text-align:center;font-weight:bold;">${state.bpm}</span>
            <button class="small-btn" data-action="bpm-step" data-value="5">+</button>
            <input data-control="bpm" type="range" min="40" max="220" value="${state.bpm}" style="width:100px" />
            <span style="color:#333;font-size:10px;font-family:monospace;">${beatMs}ms/beat</span>
          </div>

          <div class="controls-row" style="gap:10px;">
            <button data-action="tutorial-toggle"
              style="
                background:${state.tutPlaying ? "rgba(255,60,60,0.15)" : `${cfg.accent}22`};
                border:1px solid ${state.tutPlaying ? "#ff4444" : cfg.accent};
                color:${state.tutPlaying ? "#ff5555" : cfg.accent};
                padding:10px 28px;
                border-radius:9px;
                cursor:pointer;
                font-family:monospace;
                font-size:13px;
                box-shadow:${state.tutPlaying ? "0 0 14px rgba(255,0,0,0.2)" : `0 0 14px ${cfg.accent}33`};
                letter-spacing:1px;
              ">
              ${state.tutPlaying ? "⏹ STOP" : "▶ PLAY TUTORIAL"}
            </button>
          </div>

          ${!isDrumMode() ? renderPianoKeys() : ""}
        </div>
      `;
    }

    function renderSettingsTab() {
      const cfg = getCfg();
      return `
        <div class="settings-wrap">
          <div class="section-label">BPM</div>
          <div class="settings-panel" style="gap:10px;">
            <div class="row" style="gap:12px;">
              <button class="small-btn" data-action="bpm-step" data-value="-1">−</button>
              <span style="color:${cfg.accent};font-size:28px;font-family:monospace;font-weight:bold;min-width:70px;text-align:center;">${state.bpm}</span>
              <button class="small-btn" data-action="bpm-step" data-value="1">+</button>
              <input data-control="bpm" type="range" min="40" max="220" value="${state.bpm}" style="flex:1" />
            </div>
            <div class="row" style="gap:6px;">
              ${[60, 80, 100, 120, 140, 160, 180].map((b) => `
                <button class="chip-btn" data-action="set-bpm" data-value="${b}"
                  style="
                    background:${state.bpm === b ? `${cfg.accent}22` : "rgba(255,255,255,0.04)"};
                    border-color:${state.bpm === b ? cfg.accent : "rgba(255,255,255,0.07)"};
                    color:${state.bpm === b ? cfg.accent : "#555"};
                    padding:5px 12px;
                    border-radius:6px;
                  ">${b}</button>
              `).join("")}
            </div>
            <div class="row" style="gap:8px;">
              ${[["Largo", "44"], ["Adagio", "66"], ["Andante", "80"], ["Moderato", "108"], ["Allegro", "132"], ["Presto", "180"]]
                .map(([name, value]) => `
                  <button class="chip-btn" data-action="set-bpm" data-value="${value}"
                    style="
                      background:rgba(255,255,255,0.03);
                      border-color:rgba(255,255,255,0.07);
                      color:#555;
                      padding:4px 11px;
                      border-radius:6px;
                      font-size:10px;
                    ">
                    ${escapeHTML(name)} <span style="color:#333">${escapeHTML(value)}</span>
                  </button>
                `)
                .join("")}
            </div>
          </div>

          <div class="section-label">Volume & FX</div>
          <div class="settings-panel">
            <div class="row">
              <span class="row-label">Master Volume</span>
              <input data-control="volume" type="range" min="0" max="1" step="0.01" value="${state.volume}" style="flex:1" />
              <span style="color:${cfg.accent};font-family:monospace;font-size:12px;min-width:38px;">${Math.round(state.volume * 100)}%</span>
            </div>
            ${!isDrumMode() ? `
              <div class="row">
                <span class="row-label">Reverb</span>
                ${renderToggle("toggle-reverb", state.useReverb)}
              </div>
              <div class="row">
                <span class="row-label">Octave Shift</span>
                <div style="display:flex;gap:5px;flex-wrap:wrap;">
                  ${[-1, 0, 1].map((o) => `
                    <button class="chip-btn" data-action="set-octave" data-value="${o}"
                      style="
                        background:${state.octave === o ? `${cfg.accent}22` : "rgba(255,255,255,0.03)"};
                        border-color:${state.octave === o ? cfg.accent : "rgba(255,255,255,0.07)"};
                        color:${state.octave === o ? cfg.accent : "#444"};
                        padding:4px 12px;
                        border-radius:5px;
                      ">
                      ${o === 0 ? "Normal" : o > 0 ? "+1 Octave" : "-1 Octave"}
                    </button>
                  `).join("")}
                </div>
              </div>
            ` : ""}
          </div>

          <div class="section-label">Stickers & Visual</div>
          <div class="settings-panel">
            <div class="row">
              <span class="row-label">Show Stickers</span>
              ${renderToggle("toggle-stickers", state.showStickers)}
            </div>
            <div>
              <div style="font-size:10px;color:#444;font-family:monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">Sticker Pack</div>
              <div style="display:flex;gap:6px;flex-wrap:wrap;">
                ${(getCfg().stickers || []).map((s) => `
                  <span style="font-size:20px;padding:6px 8px;background:rgba(255,255,255,0.05);border-radius:7px;border:1px solid rgba(255,255,255,0.07);">${escapeHTML(s)}</span>
                `).join("")}
              </div>
            </div>
          </div>

          <div class="section-label">Style Info</div>
          <div class="settings-panel">
            <div class="row" style="gap:10px;">
              ${Object.entries(STYLES).map(([key, styleCfg]) => `
                <button class="chip-btn" data-action="set-style" data-value="${escapeHTML(key)}"
                  style="
                    padding:8px 14px;
                    border-radius:8px;
                    background:${state.style === key ? `${styleCfg.accent}20` : "rgba(255,255,255,0.02)"};
                    border-color:${state.style === key ? styleCfg.accent : "rgba(255,255,255,0.06)"};
                    color:${state.style === key ? styleCfg.accent : "#555"};
                  ">
                  ${escapeHTML(styleCfg.icon)} ${escapeHTML(styleCfg.label)}
                </button>
              `).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderRecordingsTab() {
      const cfg = getCfg();

      return `
        <div class="recordings-wrap">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
            <div style="font-size:10px;color:#444;font-family:monospace;letter-spacing:2px;text-transform:uppercase;">
              ${state.recordings.length} Recording${state.recordings.length !== 1 ? "s" : ""}
            </div>
            <button class="record-btn" data-action="rec-toggle"
              style="
                background:${state.isRecording ? "rgba(255,30,30,0.18)" : "rgba(255,255,255,0.04)"};
                border-color:${state.isRecording ? "#ff3030" : cfg.accent};
                color:${state.isRecording ? "#ff4444" : cfg.accent};
                box-shadow:${state.isRecording ? "0 0 14px rgba(255,0,0,0.3)" : `0 0 10px ${cfg.accent}33`};
                padding:8px 18px;
                border-radius:8px;
                gap:7px;
              ">
              <span class="rec-dot" style="
                width:8px;height:8px;
                background:${state.isRecording ? "#ff4444" : cfg.accent};
                animation:${state.isRecording ? "blink 1s infinite" : "none"};
                box-shadow:${state.isRecording ? "0 0 8px #ff4444" : "none"};
              "></span>
              ${state.isRecording ? `● Recording ${fmtTime(state.recTime)}` : "● New Recording"}
            </button>
          </div>

          ${state.recordings.length === 0 ? `
            <div class="recording-empty">
              <div style="font-size:36px;margin-bottom:10px;">🎙</div>
              No recordings yet. Switch to Play tab and hit REC!
            </div>
          ` : ""}

          ${state.recordings.map((r, i) => `
            <div class="recording-item" style="border-left:3px solid ${cfg.accent};">
              <div style="
                width:36px;height:36px;border-radius:50%;
                background:${cfg.accent}22;border:1px solid ${cfg.accent}44;
                display:flex;align-items:center;justify-content:center;
                font-family:monospace;font-size:14px;color:${cfg.accent};font-weight:bold;flex-shrink:0;
              ">${i + 1}</div>

              <div style="flex:1;min-width:120px;">
                <div style="color:#ccc;font-family:monospace;font-size:12px;margin-bottom:2px;">${escapeHTML(r.label)}</div>
                <div style="color:#444;font-family:monospace;font-size:10px;">${escapeHTML(r.time)}</div>
              </div>

              <audio controls src="${escapeHTML(r.url)}"></audio>

              <div style="display:flex;gap:6px;flex-shrink:0;">
                <a class="save-link" href="${escapeHTML(r.url)}" download="${escapeHTML(r.label.replace(/\s+/g, "-") + ".webm")}">↓ Save</a>
                <button class="delete-btn" data-action="delete-rec" data-value="${escapeHTML(r.id)}">🗑</button>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderToggle(action, val) {
      const cfg = getCfg();
      return `
        <button data-action="${escapeHTML(action)}" class="toggle"
          style="
            background:${val ? `${cfg.accent}55` : "rgba(255,255,255,0.08)"};
            border:1px solid ${val ? cfg.accent : "rgba(255,255,255,0.1)"};
          ">
          <span class="toggle-knob" style="
            left:${val ? 22 : 3}px;
            background:${val ? cfg.accent : "#444"};
            box-shadow:${val ? `0 0 6px ${cfg.accent}88` : "none"};
          "></span>
        </button>
      `;
    }

    function renderTabContent() {
      if (state.tab === "play") {
        return renderPlayTab();
      }
      if (state.tab === "tutorial") {
        return renderTutorialTab();
      }
      if (state.tab === "settings") {
        return renderSettingsTab();
      }
      return renderRecordingsTab();
    }

    function renderApp() {
      const cfg = getCfg();
      refs.app.style.setProperty("--accent", cfg.accent);
      refs.app.style.setProperty("--accent2", cfg.accent2);

      refs.app.innerHTML = `
        <div class="studio-root" style="background:${cfg.bg};color:#f0ece4;font-family:${cfg.font};">
          <div class="ambient" style="background:radial-gradient(ellipse 80% 60% at 50% 85%, ${cfg.accent}18 0%, transparent 70%);"></div>

          <div class="layer header">
            <div>
              <div class="tiny-label" style="color:${cfg.accent}66;">Studio</div>
              <div class="title" style="background-image:linear-gradient(90deg,${cfg.accent},${cfg.accent2},#fff6);">
                ${escapeHTML(cfg.icon)} ${escapeHTML(cfg.label)}
              </div>
            </div>
            <div class="recent-notes">
              ${state.recentNotes.map((note, i) => `
                <span style="font-size:10px;color:${cfg.accent};opacity:${Math.max(0.1, 1 - i * 0.14)};font-family:monospace;transition:all 0.3s;">
                  ${escapeHTML(note)}
                </span>
              `).join("")}
            </div>
          </div>

          <div class="style-selector">
            ${Object.entries(STYLES).map(([key, styleCfg]) => `
              <button class="chip-btn" data-action="set-style" data-value="${escapeHTML(key)}"
                style="
                  background:${state.style === key ? `${styleCfg.accent}25` : "rgba(255,255,255,0.03)"};
                  border-color:${state.style === key ? styleCfg.accent : "rgba(255,255,255,0.07)"};
                  color:${state.style === key ? styleCfg.accent : "#444"};
                  box-shadow:${state.style === key ? `0 0 16px ${styleCfg.accent}33` : "none"};
                ">
                ${escapeHTML(styleCfg.icon)} ${escapeHTML(styleCfg.label)}
              </button>
            `).join("")}
          </div>

          <div class="tab-bar">
            ${[
              ["play", "🎹 Play"],
              ["tutorial", "🎵 Tutorial"],
              ["settings", "⚙️ Settings"],
              ["recordings", "⏺ Recordings"]
            ].map(([tab, label]) => `
              <button class="tab-btn" data-action="set-tab" data-value="${tab}"
                style="background:${state.tab === tab ? `${cfg.accent}22` : "transparent"};color:${state.tab === tab ? cfg.accent : "#444"};">
                ${escapeHTML(label)}
              </button>
            `).join("")}
          </div>

          <div class="tab-content">
            ${renderTabContent()}
          </div>
        </div>
      `;

      bindInteractions();
    }

    function handleAction(action, value) {
      if (action === "set-style") {
        state.style = value;
        state.activeKeys = new Set();
        stopTutorial(true);
        initStickerSlots();
        renderApp();
        return;
      }

      if (action === "set-tab") {
        state.tab = value;
        if (value !== "tutorial") {
          stopTutorial(true);
        }
        renderApp();
        return;
      }

      if (action === "set-octave") {
        state.octave = Number(value);
        renderApp();
        return;
      }

      if (action === "toggle-reverb") {
        state.useReverb = !state.useReverb;
        renderApp();
        return;
      }

      if (action === "toggle-stickers") {
        state.showStickers = !state.showStickers;
        renderApp();
        return;
      }

      if (action === "rec-toggle") {
        if (state.isRecording) {
          stopRec();
        } else {
          startRec();
        }
        return;
      }

      if (action === "select-song") {
        state.selectedSong = value;
        stopTutorial(true);
        renderApp();
        return;
      }

      if (action === "bpm-step") {
        state.bpm = clamp(state.bpm + Number(value), 40, 220);
        renderApp();
        return;
      }

      if (action === "set-bpm") {
        state.bpm = clamp(Number(value), 40, 220);
        renderApp();
        return;
      }

      if (action === "tutorial-toggle") {
        if (state.tutPlaying) {
          stopTutorial();
        } else {
          playTutorial();
        }
        return;
      }

      if (action === "delete-rec") {
        deleteRec(value);
      }
    }

    function bindInteractions() {
      const actionNodes = refs.app.querySelectorAll("[data-action]");
      actionNodes.forEach((node) => {
        node.addEventListener("click", () => {
          handleAction(node.dataset.action, node.dataset.value);
        });
      });

      const volumeNodes = refs.app.querySelectorAll('[data-control="volume"]');
      volumeNodes.forEach((node) => {
        node.addEventListener("input", (e) => {
          state.volume = clamp(parseFloat(e.target.value), 0, 1);
          renderApp();
        });
      });

      const bpmNodes = refs.app.querySelectorAll('[data-control="bpm"]');
      bpmNodes.forEach((node) => {
        node.addEventListener("input", (e) => {
          state.bpm = clamp(Number(e.target.value), 40, 220);
          renderApp();
        });
      });

      const keyNodes = refs.app.querySelectorAll(".playable-key");
      keyNodes.forEach((node) => {
        const key = node.dataset.key;
        node.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          triggerKey(key, true);
        });
        node.addEventListener("pointerup", (e) => {
          e.preventDefault();
          triggerKey(key, false);
        });
        node.addEventListener("pointercancel", () => {
          if (state.activeKeys.has(key)) {
            triggerKey(key, false);
          }
        });
        node.addEventListener("pointerleave", () => {
          if (state.activeKeys.has(key)) {
            triggerKey(key, false);
          }
        });
      });
    }

    function setupKeyboardHandlers() {
      refs.keyDownHandler = (e) => {
        if (e.repeat || e.metaKey || e.ctrlKey) {
          return;
        }
        const k = e.key.toLowerCase();
        const validKeys = isDrumMode() ? DRUM_MAP.map((d) => d.key) : KEY_MAP.map((d) => d.key);
        if (validKeys.includes(k)) {
          e.preventDefault();
          triggerKey(k, true);
        }
      };

      refs.keyUpHandler = (e) => {
        const k = e.key.toLowerCase();
        const validKeys = isDrumMode() ? DRUM_MAP.map((d) => d.key) : KEY_MAP.map((d) => d.key);
        if (validKeys.includes(k)) {
          triggerKey(k, false);
        }
      };

      window.addEventListener("keydown", refs.keyDownHandler);
      window.addEventListener("keyup", refs.keyUpHandler);
    }

    function cleanupKeyboardHandlers() {
      if (refs.keyDownHandler) {
        window.removeEventListener("keydown", refs.keyDownHandler);
      }
      if (refs.keyUpHandler) {
        window.removeEventListener("keyup", refs.keyUpHandler);
      }
      refs.keyDownHandler = null;
      refs.keyUpHandler = null;
    }

    function cleanup() {
      stopTutorial(true);
      stopRec(true);
      cleanupKeyboardHandlers();

      refs.objectUrls.forEach((url) => {
        URL.revokeObjectURL(url);
      });
      refs.objectUrls.clear();

      audio.cleanup();
    }

    function init() {
      refs.app = document.getElementById("app");
      initStickerSlots();
      setupKeyboardHandlers();
      window.addEventListener("beforeunload", cleanup);
      renderApp();
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
